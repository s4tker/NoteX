<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteX | Digital Brain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside id="Sidebar">
        <div class="SidebarHeader">
            <h1 class="Brand">NoteX</h1>
            <div class="Actions">
                <button id="BtnNewFolder" title="New Folder">🗁</button>
                <button id="BtnNewNote" title="New Note">+</button>
            </div>
        </div>

        <div class="SearchContainer">
            <input type="text" id="InputSearch" placeholder="Search notes...">
        </div>

        <nav id="FileTree" class="CustomScroll"></nav>

        <div class="SidebarFooter">
            <button id="BtnThemeToggle">
                <span class="ThemeIcon">☀</span>
                <span class="ThemeText">Switch Appearance</span>
            </button>
        </div>
    </aside>

    <main id="MainContent">
        <div id="EmptyState" class="EmptyState">
            <div class="Icon">🖉 </div>
            <h2>Welcome to NoteX</h2>
            <p>Select a note or folder to start organizing.</p>
        </div>

        <section id="EditorWrapper" class="Hidden">
            <header class="EditorHeader">
                <div class="Breadcrumbs" id="Breadcrumbs">Workspace</div>
                <div class="HeaderActions">
                    <button id="BtnDeleteFolder" class="BtnDanger Hidden">Delete Folder</button>
                    <button id="BtnDeleteNote" class="BtnDanger">Delete Note</button>
                </div>
            </header>

            <div class="EditorScroll CustomScroll">
                <input type="text" id="NoteTitle" placeholder="Untitled Note" spellcheck="false">

                <div class="ViewTabs">
                    <button class="TabBtn Active" data-target="MarkdownInput">🖉  Edit</button>
                    <button class="TabBtn" data-target="MarkdownPreview">👁 Preview</button>
                </div>

                <div class="ContentArea">
                    <textarea id="MarkdownInput" placeholder="Start typing..." spellcheck="false"></textarea>
                    <div id="MarkdownPreview" class="MarkdownBody Hidden"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
